<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Investment Dashboard</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        padding: 2rem;
      }
      header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 2rem;
      }
      header h1 { font-size: 1.75rem; font-weight: 700; }
      header span { font-size: 1.75rem; }
      .controls {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      input[type="text"] {
        padding: 0.6rem 1rem;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #1e293b;
        color: #e2e8f0;
        font-size: 1rem;
        width: 180px;
        outline: none;
      }
      input[type="text"]:focus { border-color: #6366f1; }
      button {
        padding: 0.6rem 1.4rem;
        border-radius: 8px;
        border: none;
        background: #6366f1;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover { background: #4f46e5; }
      button:disabled { background: #334155; cursor: not-allowed; }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 1.25rem;
      }
      .card .label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.05em; }
      .card .value { font-size: 1.6rem; font-weight: 700; }
      .card .value.green  { color: #4ade80; }
      .card .value.yellow { color: #facc15; }
      .card .value.red    { color: #f87171; }
      pre {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 1.25rem;
        overflow: auto;
        font-size: 0.85rem;
        line-height: 1.6;
        color: #94a3b8;
        max-height: 400px;
      }
      .status { margin-bottom: 1rem; font-size: 0.9rem; color: #94a3b8; }
      .status.ok  { color: #4ade80; }
      .status.err { color: #f87171; }
      h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; color: #cbd5e1; }
    </style>
  </head>
  <body>
    <header>
      <span>📈</span>
      <h1>Investment Dashboard</h1>
    </header>

    <div class="controls">
      <input type="text" id="ticker" placeholder="e.g. AAPL" value="AAPL" />
      <button id="predictBtn" onclick="predict()">Get Prediction</button>
      <button id="healthBtn" onclick="checkHealth()">Health Check</button>
    </div>

    <p class="status" id="status">Ready.</p>

    <div class="cards" id="cards"></div>

    <h2>Raw API Response</h2>
    <pre id="result">Press "Get Prediction" to fetch data from the API.</pre>

    <script>
      const API_BASE = 'http://localhost:9000';

      function scoreClass(val) {
        if (val >= 70) return 'green';
        if (val >= 50) return 'yellow';
        return 'red';
      }

      function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = 'status ' + (type || '');
      }

      function renderCards(data) {
        const container = document.getElementById('cards');
        container.innerHTML = '';
        const scores = data.scores || {};
        const entries = [
          { label: 'Composite', key: 'composite' },
          { label: 'Stability', key: 'stability' },
          { label: 'Quality',   key: 'quality' },
          { label: 'Valuation', key: 'valuation' },
        ];
        entries.forEach(({ label, key }) => {
          const val = scores[key];
          if (val === undefined) return;
          const cls = scoreClass(val);
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `<div class="label">${label}</div><div class="value ${cls}">${val}/100</div>`;
          container.appendChild(card);
        });
        if (data.news_sentiment !== undefined) {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `<div class="label">News Sentiment</div><div class="value">${Number(data.news_sentiment).toFixed(3)}</div>`;
          container.appendChild(card);
        }
      }

      async function predict() {
        const ticker = document.getElementById('ticker').value.trim().toUpperCase();
        if (!ticker) { setStatus('Please enter a ticker symbol.', 'err'); return; }
        const btn = document.getElementById('predictBtn');
        btn.disabled = true;
        setStatus(`Fetching prediction for ${ticker}…`);
        try {
          const resp = await fetch(`${API_BASE}/predict/${ticker}`);
          const data = await resp.json();
          document.getElementById('result').textContent = JSON.stringify(data, null, 2);
          if (!resp.ok) {
            setStatus(`API error ${resp.status}: ${data.error || resp.statusText}`, 'err');
            return;
          }
          renderCards(data);
          setStatus(`Loaded prediction for ${ticker}.`, 'ok');
        } catch (err) {
          document.getElementById('result').textContent = String(err);
          setStatus('Error: Could not reach the API. Is the Flask server running on port 9000?', 'err');
        } finally {
          btn.disabled = false;
        }
      }

      async function checkHealth() {
        setStatus('Checking API health…');
        try {
          const resp = await fetch(`${API_BASE}/health`);
          const data = await resp.json();
          document.getElementById('result').textContent = JSON.stringify(data, null, 2);
          document.getElementById('cards').innerHTML = '';
          if (!resp.ok) {
            setStatus(`API error ${resp.status}: ${data.error || resp.statusText}`, 'err');
            return;
          }
          setStatus('API is healthy ✓', 'ok');
        } catch (err) {
          document.getElementById('result').textContent = String(err);
          setStatus('Error: Could not reach the API. Is the Flask server running on port 9000?', 'err');
        }
      }
    </script>
  </body>
</html>
